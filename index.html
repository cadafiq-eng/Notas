<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f3460"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Colecciones"/>
  <meta name="description" content="Guarda y organiza páginas web en colecciones"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <title>MisColecciones</title>
  <style>
    :root {
      --bg:#1a1a2e; --surface:#16213e; --surface2:#0f3460;
      --accent:#e94560; --accent2:#533483;
      --text:#eaeaea; --text2:#a0a0b0; --border:#2a2a4a;
      --success:#4ecca3; --warning:#f7b731; --error:#e94560; --radius:12px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;
      padding-top:var(--safe-top);
      padding-bottom:var(--safe-bottom);
      max-width:640px;margin:0 auto;
    }

    /* ── HEADER ── */
    .app-header{
      background:linear-gradient(135deg,var(--surface2),var(--accent2));
      padding:14px 16px 12px;
      display:flex;align-items:center;gap:12px;
      flex-shrink:0;
      position:relative;
    }
    .app-header h1{font-size:18px;font-weight:700;flex:1}
    .sync-indicator{
      display:inline-flex;align-items:center;gap:6px;
      font-size:11px;padding:4px 8px;border-radius:6px;
      background:rgba(78,204,163,.2);color:var(--success);
      transition:all .3s;
    }
    .sync-indicator.syncing{
      background:rgba(247,183,49,.2);color:var(--warning);
      animation:pulse 1s infinite;
    }
    .sync-indicator.error{
      background:rgba(233,69,96,.2);color:var(--error);
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
    .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .header-actions{display:flex;gap:8px}
    .hbtn{
      background:rgba(255,255,255,.18);border:none;border-radius:8px;
      color:#fff;cursor:pointer;padding:6px 11px;font-size:12px;
      font-weight:600;transition:background .2s;white-space:nowrap;
    }
    .hbtn:active{background:rgba(255,255,255,.3)}
    .hbtn.warning{background:rgba(233,69,96,.25);color:var(--error)}

    /* ── AUTH SECTION ── */
    .auth-container{
      padding:16px;background:var(--surface);border-radius:var(--radius);
      margin:12px;
    }
    .auth-form{display:flex;flex-direction:column;gap:12px}
    .auth-input{
      padding:10px 12px;background:var(--surface2);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:14px;
    }
    .auth-input::placeholder{color:var(--text2)}
    .auth-btn{
      padding:10px;background:var(--accent);color:#fff;border:none;
      border-radius:8px;font-weight:600;cursor:pointer;transition:background .2s;
    }
    .auth-btn:active{background:#d63950}
    .auth-btn:disabled{background:var(--text2);cursor:not-allowed}
    .auth-status{
      font-size:12px;padding:8px;border-radius:6px;text-align:center;
      background:var(--surface2);color:var(--text2);
    }
    .auth-status.success{background:rgba(78,204,163,.15);color:var(--success)}
    .auth-status.error{background:rgba(233,69,96,.15);color:var(--error)}
    .auth-link{
      text-align:center;font-size:12px;color:var(--text2);
      cursor:pointer;text-decoration:none;transition:color .2s;
    }
    .auth-link:active{color:var(--accent)}
    .divider{
      height:1px;background:var(--border);margin:8px 0;
    }

    /* ── MAIN CONTENT ── */
    .app-content{
      flex:1;overflow:auto;padding-bottom:var(--safe-bottom);
      display:flex;flex-direction:column;
    }
    .collections-list{
      flex:1;overflow:auto;padding:12px;
      display:flex;flex-direction:column;gap:10px;
    }
    .empty-state{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      flex:1;gap:16px;color:var(--text2);
      padding:20px;text-align:center;
    }
    .empty-state svg{width:60px;height:60px;opacity:.5}

    /* ── COLLECTION CARD ── */
    .collection-card{
      background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:12px;cursor:pointer;
      transition:all .2s;position:relative;
    }
    .collection-card:active{background:var(--surface2);border-color:var(--accent)}
    .collection-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:8px}
    .collection-title{font-weight:600;font-size:14px;flex:1}
    .collection-meta{font-size:11px;color:var(--text2);margin-top:4px}
    .collection-actions{display:flex;gap:4px}
    .icon-btn{
      background:transparent;border:none;color:var(--text2);cursor:pointer;
      padding:4px 8px;border-radius:6px;font-size:12px;
      transition:all .2s;
    }
    .icon-btn:active{background:var(--surface2);color:var(--accent)}

    /* ── MODAL ── */
    .modal{
      display:none;position:fixed;top:0;left:0;right:0;bottom:0;
      background:rgba(0,0,0,.7);z-index:1000;
      align-items:flex-end;justify-content:center;padding-bottom:var(--safe-bottom);
    }
    .modal.active{display:flex;animation:slideUp .3s}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-content{
      background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;
      width:100%;max-height:80vh;overflow:auto;padding:16px;
      display:flex;flex-direction:column;gap:12px;
    }
    .modal-title{font-size:16px;font-weight:700;margin-bottom:8px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-label{font-size:12px;color:var(--text2);font-weight:600}
    .form-input{
      padding:10px 12px;background:var(--bg);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-size:14px;
    }
    .form-input::placeholder{color:var(--text2)}
    .form-buttons{display:flex;gap:8px;margin-top:8px}
    .btn-primary{
      flex:1;padding:10px;background:var(--accent);color:#fff;
      border:none;border-radius:8px;font-weight:600;cursor:pointer;
    }
    .btn-secondary{
      flex:1;padding:10px;background:var(--surface2);color:var(--text);
      border:none;border-radius:8px;font-weight:600;cursor:pointer;
    }

    /* ── FLOATING ACTION BUTTON ── */
    .fab{
      position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;
      width:56px;height:56px;border-radius:50%;background:var(--accent);
      color:#fff;border:none;font-size:24px;cursor:pointer;
      box-shadow:0 4px 12px rgba(233,69,96,.3);
      display:flex;align-items:center;justify-content:center;
      z-index:100;transition:all .2s;
    }
    .fab:active{transform:scale(.95);box-shadow:0 2px 8px rgba(233,69,96,.2)}

    /* ── LOADER ── */
    .loader{
      display:inline-block;width:12px;height:12px;border:2px solid var(--text2);
      border-top:2px solid var(--accent);border-radius:50%;
      animation:spin .6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── BACK BUTTON ── */
    .back-btn{
      display:flex;align-items:center;gap:6px;
      background:transparent;border:none;color:var(--accent);
      cursor:pointer;font-size:14px;font-weight:600;
      padding:8px 0;margin-bottom:8px;
      transition:color .2s;
    }
    .back-btn:active{color:var(--text)}
  </style>
</head>
<body>
  <!-- HEADER -->
  <div class="app-header">
    <h1>🗂️ MisColecciones</h1>
    <div class="sync-indicator" id="syncStatus">
      <div class="dot"></div>
      <span id="syncText">Sincronizado</span>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="exportBtn">⬇️ Export</button>
      <button class="hbtn" id="importBtn">⬆️ Import</button>
      <button class="hbtn warning" id="signOutBtn" style="display:none;">Logout</button>
    </div>
  </div>

  <!-- AUTH SECTION (hidden when logged in) -->
  <div id="authSection" class="auth-container">
    <div class="modal-title">Sincronizar con Supabase</div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="auth-form">
        <input type="email" class="auth-input" id="emailInput" placeholder="tu@email.com"/>
        <input type="password" class="auth-input" id="passwordInput" placeholder="Contraseña"/>
        <button class="auth-btn" id="signInBtn">Iniciar sesión / Registrarse</button>
        <div class="auth-status" id="authStatus"></div>
      </div>
      <div class="divider"></div>
      <div class="auth-link" onclick="showPasswordReset()">¿Olvidaste tu contraseña?</div>
    </div>

    <!-- PASSWORD RESET FORM (hidden by default) -->
    <div id="resetForm" style="display:none;">
      <button class="back-btn" onclick="showLoginForm()">← Volver</button>
      <div class="auth-form">
        <p style="font-size:13px;color:var(--text2);margin-bottom:8px;">
          Escribe tu email y te enviaremos un enlace para restablecer tu contraseña.
        </p>
        <input type="email" class="auth-input" id="resetEmailInput" placeholder="tu@email.com"/>
        <button class="auth-btn" id="resetBtn">Enviar enlace de recuperación</button>
        <div class="auth-status" id="resetStatus"></div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="app-content">
    <div class="collections-list" id="collectionsList">
      <div class="empty-state">
        <div>📚 Sin colecciones aún</div>
        <div style="font-size:12px">Presiona el botón + para crear una nueva</div>
      </div>
    </div>
  </div>

  <!-- FAB (Floating Action Button) -->
  <button class="fab" id="newCollectionBtn">+</button>

  <!-- MODAL: Crear/Editar colección -->
  <div class="modal" id="collectionModal">
    <div class="modal-content">
      <div class="modal-title">Nueva colección</div>
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" id="collectionName" placeholder="Ej: Artículos de tecnología"/>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción (opcional)</label>
        <textarea class="form-input" id="collectionDesc" placeholder="Describe esta colección..." style="min-height:80px;resize:none;font-family:inherit"></textarea>
      </div>
      <div class="form-buttons">
        <button class="btn-primary" id="saveCollectionBtn">Guardar</button>
        <button class="btn-secondary" id="closeModalBtn">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL: Importar datos -->
  <input type="file" id="importFile" accept=".json" style="display:none"/>

  <script>
    // ===== CONFIGURACIÓN SUPABASE =====
    // REEMPLAZA ESTOS VALORES CON TUS CREDENCIALES
    const SUPABASE_URL = 'https://gqcfqzwyqgvpvxzvowcl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxY2Zxend5cWd2cHZ4enZvd2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjY1MTgsImV4cCI6MjA5ODM0MjUxOH0.QRM2bAjhPxW9ougxO0tFc04MaOu217mnl7_M4o6mbp8';

    // Inicializar cliente Supabase
    let supabase;
    try {
      if (SUPABASE_URL !== 'https://YOUR-PROJECT.supabase.co') {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch (e) {
      console.warn('Supabase no configurado. Modo offline disponible.');
    }

    // ===== ESTADO DE LA APP =====
    const state = {
      collections: [],
      user: null,
      useCloud: false,
      isEditing: null,
    };

    // ===== INICIALIZACIÓN =====
    async function init() {
      await checkAuth();
      await loadCollections();
      attachEventListeners();
    }

    // ===== AUTENTICACIÓN =====
    async function checkAuth() {
      if (!supabase) {
        document.getElementById('authSection').style.display = 'none';
        return;
      }

      const { data } = await supabase.auth.getSession();
      if (data.session) {
        state.user = data.session.user;
        state.useCloud = true;
        updateAuthUI();
      }
    }

    document.getElementById('signInBtn').addEventListener('click', async () => {
      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const statusEl = document.getElementById('authStatus');

      if (!email || !password) {
        showAuthStatus('Email y contraseña requeridos', 'error');
        return;
      }

      try {
        // Intenta login, si falla, registra
        let { data, error } = await supabase.auth.signInWithPassword({ email, password });

        if (error?.status === 400) {
          // Usuario no existe, registrar
          ({ data, error } = await supabase.auth.signUp({ email, password }));
          if (error) throw error;
          showAuthStatus('Cuenta creada. Revisa tu email para confirmar.', 'success');
        } else if (error) {
          throw error;
        } else {
          state.user = data.session.user;
          state.useCloud = true;
          updateAuthUI();
          await loadCollections();
          showAuthStatus('¡Sesión iniciada!', 'success');
        }
      } catch (err) {
        showAuthStatus(err.message, 'error');
      }
    });

    // ===== RECUPERACIÓN DE CONTRASEÑA =====
    function showPasswordReset() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
    }

    function showLoginForm() {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('resetStatus').textContent = '';
    }

    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('resetEmailInput').value;
      const resetStatusEl = document.getElementById('resetStatus');

      if (!email) {
        showResetStatus('Email requerido', 'error');
        return;
      }

      try {
        document.getElementById('resetBtn').disabled = true;
        showResetStatus('Enviando...', 'info');

        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + window.location.pathname + '?reset=true'
        });

        if (error) throw error;

        showResetStatus(
          'Email de recuperación enviado! Revisa tu bandeja de entrada (y spam). Sigue el enlace para restablecer tu contraseña.',
          'success'
        );
        document.getElementById('resetEmailInput').value = '';
      } catch (err) {
        showResetStatus(err.message, 'error');
      } finally {
        document.getElementById('resetBtn').disabled = false;
      }
    });

    function showResetStatus(msg, type) {
      const el = document.getElementById('resetStatus');
      el.textContent = msg;
      el.className = 'auth-status ' + type;
    }

    // ===== MANEJAR ENLACE DE RECUPERACIÓN =====
    function handlePasswordReset() {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('reset') === 'true') {
        // El usuario viene desde el email de recuperación
        const newPassword = prompt('Escribe tu nueva contraseña:');
        if (newPassword && supabase) {
          supabase.auth.updateUser({ password: newPassword }).then(({ error }) => {
            if (error) {
              alert('Error: ' + error.message);
            } else {
              alert('Contraseña restablecida! Puedes iniciar sesión ahora.');
              // Limpiar URL
              window.history.replaceState({}, document.title, window.location.pathname);
            }
          });
        }
      }
    }

    document.getElementById('signOutBtn').addEventListener('click', async () => {
      if (supabase) {
        await supabase.auth.signOut();
      }
      state.user = null;
      state.useCloud = false;
      updateAuthUI();
      state.collections = [];
      renderCollections();
    });

    function updateAuthUI() {
      const authSection = document.getElementById('authSection');
      const signOutBtn = document.getElementById('signOutBtn');
      if (state.user) {
        authSection.style.display = 'none';
        signOutBtn.style.display = 'block';
      } else {
        authSection.style.display = 'block';
        signOutBtn.style.display = 'none';
      }
    }

    function showAuthStatus(msg, type) {
      const el = document.getElementById('authStatus');
      el.textContent = msg;
      el.className = 'auth-status ' + type;
    }

    // ===== CARGAR COLECCIONES =====
    async function loadCollections() {
      try {
        if (state.useCloud && supabase) {
          updateSyncStatus('syncing');
          const { data, error } = await supabase
            .from('collections')
            .select('*')
            .eq('user_id', state.user.id)
            .order('created_at', { ascending: false });

          if (error) throw error;
          state.collections = data || [];
          updateSyncStatus('synced');
        } else {
          // Modo offline: localStorage
          const saved = localStorage.getItem('collections');
          state.collections = saved ? JSON.parse(saved) : [];
        }
        renderCollections();
      } catch (err) {
        console.error('Error al cargar:', err);
        updateSyncStatus('error');
      }
    }

    // ===== GUARDAR COLECCIÓN =====
    async function saveCollection() {
      const name = document.getElementById('collectionName').value.trim();
      const desc = document.getElementById('collectionDesc').value.trim();

      if (!name) {
        alert('El nombre es requerido');
        return;
      }

      try {
        updateSyncStatus('syncing');
        let newCollection;

        if (state.useCloud && supabase) {
          // Guardar en Supabase
          if (state.isEditing) {
            const { error } = await supabase
              .from('collections')
              .update({ name, description: desc, updated_at: new Date() })
              .eq('id', state.isEditing)
              .eq('user_id', state.user.id);
            if (error) throw error;
          } else {
            const { data, error } = await supabase
              .from('collections')
              .insert([{
                name,
                description: desc,
                user_id: state.user.id,
                created_at: new Date(),
                updated_at: new Date()
              }])
              .select();
            if (error) throw error;
            newCollection = data[0];
          }
          updateSyncStatus('synced');
        } else {
          // Guardar en localStorage
          if (state.isEditing) {
            const idx = state.collections.findIndex(c => c.id === state.isEditing);
            if (idx >= 0) {
              state.collections[idx] = { ...state.collections[idx], name, description: desc };
            }
          } else {
            newCollection = {
              id: 'col_' + Date.now(),
              name,
              description: desc,
              items: [],
              created_at: new Date(),
              updated_at: new Date()
            };
            state.collections.unshift(newCollection);
          }
          localStorage.setItem('collections', JSON.stringify(state.collections));
        }

        closeModal();
        await loadCollections();
      } catch (err) {
        alert('Error: ' + err.message);
        updateSyncStatus('error');
      }
    }

    // ===== ELIMINAR COLECCIÓN =====
    async function deleteCollection(id) {
      if (!confirm('¿Eliminar esta colección?')) return;

      try {
        updateSyncStatus('syncing');
        if (state.useCloud && supabase) {
          const { error } = await supabase
            .from('collections')
            .delete()
            .eq('id', id)
            .eq('user_id', state.user.id);
          if (error) throw error;
        } else {
          state.collections = state.collections.filter(c => c.id !== id);
          localStorage.setItem('collections', JSON.stringify(state.collections));
        }
        updateSyncStatus('synced');
        await loadCollections();
      } catch (err) {
        alert('Error: ' + err.message);
        updateSyncStatus('error');
      }
    }

    // ===== RENDERIZAR COLECCIONES =====
    function renderCollections() {
      const list = document.getElementById('collectionsList');

      if (!state.collections.length) {
        list.innerHTML = '<div class="empty-state"><div>📚 Sin colecciones aún</div><div style="font-size:12px">Presiona el botón + para crear una nueva</div></div>';
        return;
      }

      list.innerHTML = state.collections.map(col => `
        <div class="collection-card" onclick="editCollection('${col.id}')">
          <div class="collection-header">
            <div>
              <div class="collection-title">${escapeHtml(col.name)}</div>
              <div class="collection-meta">${col.description || 'Sin descripción'}</div>
            </div>
            <div class="collection-actions">
              <button class="icon-btn" onclick="editCollection('${col.id}'); event.stopPropagation();">✏️</button>
              <button class="icon-btn" onclick="deleteCollection('${col.id}'); event.stopPropagation();">🗑️</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function editCollection(id) {
      const col = state.collections.find(c => c.id === id);
      if (!col) return;
      state.isEditing = id;
      document.getElementById('collectionName').value = col.name;
      document.getElementById('collectionDesc').value = col.description || '';
      document.querySelector('.modal-title').textContent = 'Editar colección';
      openModal();
    }

    // ===== MODAL HELPERS =====
    function openModal() {
      document.getElementById('collectionModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('collectionModal').classList.remove('active');
      document.getElementById('collectionName').value = '';
      document.getElementById('collectionDesc').value = '';
      document.querySelector('.modal-title').textContent = 'Nueva colección';
      state.isEditing = null;
    }

    // ===== EXPORT / IMPORT =====
    function exportData() {
      const data = {
        version: 1,
        exported: new Date().toISOString(),
        collections: state.collections
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'colecciones-' + Date.now() + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData() {
      document.getElementById('importFile').click();
    }

    document.getElementById('importFile').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (evt) => {
        try {
          const data = JSON.parse(evt.target.result);
          if (!data.collections || !Array.isArray(data.collections)) {
            throw new Error('Formato inválido');
          }

          // Merge con datos existentes
          const imported = data.collections;
          const existingIds = new Set(state.collections.map(c => c.id));
          const newCollections = imported.filter(c => !existingIds.has(c.id));

          if (state.useCloud && supabase) {
            for (const col of newCollections) {
              await supabase.from('collections').insert([{
                ...col,
                user_id: state.user.id
              }]);
            }
          } else {
            state.collections.push(...newCollections);
            localStorage.setItem('collections', JSON.stringify(state.collections));
          }

          await loadCollections();
          alert(`Se importaron ${newCollections.length} colecciones`);
        } catch (err) {
          alert('Error al importar: ' + err.message);
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    // ===== SYNC STATUS =====
    function updateSyncStatus(status) {
      const el = document.getElementById('syncStatus');
      const text = document.getElementById('syncText');
      el.className = 'sync-indicator ' + status;
      text.textContent = {
        synced: '✓ Sincronizado',
        syncing: '⟳ Sincronizando...',
        error: '✗ Error'
      }[status] || 'Desconocido';
    }

    // ===== EVENT LISTENERS =====
    function attachEventListeners() {
      document.getElementById('newCollectionBtn').addEventListener('click', () => {
        state.isEditing = null;
        openModal();
      });
      document.getElementById('saveCollectionBtn').addEventListener('click', saveCollection);
      document.getElementById('closeModalBtn').addEventListener('click', closeModal);
      document.getElementById('exportBtn').addEventListener('click', exportData);
      document.getElementById('importBtn').addEventListener('click', importData);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Iniciar app
    init();
    handlePasswordReset();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(e => console.log('SW no registrado'));
    }
  </script>
</body>
</html>
