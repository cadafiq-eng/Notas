<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Bitácora IA — Notas de voz con transcripción y resumen</title>
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Bitácora IA" />
<style>
  :root {
    --mint: #6ee7b7;
    --mint-dim: #3fae84;
    --bg: #0f1115;
    --bg-elev: #161922;
    --bg-elev-2: #1e2230;
    --border: #2a2f3d;
    --text: #e9ecf1;
    --text-dim: #9aa1b1;
    --danger: #f08080;
    --radius: 14px;
    --radius-sm: 9px;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  [data-theme="light"] {
    --bg: #f6f5f1;
    --bg-elev: #ffffff;
    --bg-elev-2: #eeede7;
    --border: #ddd9cf;
    --text: #1c1d1f;
    --text-dim: #6b6f76;
    --mint-dim: #1f9c6d;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  button { font-family: inherit; }
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ---------- Header ---------- */
  header.topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: calc(env(safe-area-inset-top) + 12px) 14px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--mint);
    box-shadow: 0 0 8px var(--mint);
  }
  .searchbox {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 14px;
  }
  .searchbox input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
  }
  .searchbox svg { flex-shrink: 0; opacity: .6; }
  .icon-btn {
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.94); }

  /* ---------- Layout ---------- */
  .body-wrap {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  nav.folders {
    width: 210px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 14px 10px;
    overflow-y: auto;
  }
  nav.folders .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    padding: 6px 10px 8px;
  }
  .folder-item {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 2px;
  }
  .folder-item:hover { background: var(--bg-elev); }
  .folder-item.active { background: var(--bg-elev-2); font-weight: 600; }
  .folder-swatch { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
  .folder-item .count { margin-left: auto; font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
  .new-folder-btn {
    width: 100%; text-align: left;
    padding: 9px 10px; margin-top: 6px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border);
    background: none;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
  }

  main.content {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px 100px;
  }

  /* ---------- Note list ---------- */
  .notes-grid { display: flex; flex-direction: column; gap: 8px; }
  .note-card {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .note-card:active { background: var(--bg-elev-2); }
  .note-card .row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .note-card .title { font-weight: 650; font-size: 15px; }
  .note-card .meta { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); white-space: nowrap; }
  .note-card .preview { font-size: 13px; color: var(--text-dim); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .note-card .tags { display: flex; gap: 6px; margin-top: 2px; }
  .pill {
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--bg-elev-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .pill.status-pending { color: #e0b35c; border-color: #4a3d22; }
  .pill.status-ready { color: var(--mint-dim); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state h3 { color: var(--text); margin-bottom: 6px; }
  .empty-state svg { opacity: .35; margin-bottom: 10px; }

  /* ---------- FAB ---------- */
  .fab {
    position: fixed;
    right: 24px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--mint);
    color: #06140e;
    border: none;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(0,0,0,.35);
    cursor: pointer;
    z-index: 30;
  }
  .fab:active { transform: scale(0.93); }

  /* ---------- Modals / sheets ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 50;
  }
  .overlay.show { display: flex; }
  @media (min-width: 640px) {
    .overlay { align-items: center; }
  }
  .sheet {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 560px;
    max-height: 88dvh;
    border-radius: 20px 20px 0 0;
    padding: 18px 18px calc(18px + env(safe-area-inset-bottom));
    overflow-y: auto;
  }
  @media (min-width: 640px) {
    .sheet { border-radius: 18px; max-height: 80dvh; }
  }
  .sheet h2 { margin: 0 0 14px; font-size: 17px; }
  .sheet .close-row { display: flex; justify-content: flex-end; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; color: var(--text-dim); margin-bottom: 6px; }
  .field input[type=text], .field input[type=password], .field textarea, .field select {
    width: 100%;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field .hint { font-size: 11.5px; color: var(--text-dim); margin-top: 5px; line-height: 1.4; }
  .btn-row { display: flex; gap: 10px; margin-top: 6px; }
  .btn {
    flex: 1;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-elev-2);
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn.primary { background: var(--mint); border-color: var(--mint); color: #06140e; }
  .btn.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; border: 2px solid transparent;
  }
  .color-swatch.selected { border-color: var(--text); }

  .folder-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
  }
  .folder-row span.name { flex: 1; font-size: 14px; }
  .folder-row button {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; padding: 4px;
  }

  /* ---------- Recording sheet ---------- */
  .rec-visual {
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 10px 18px;
  }
  .rec-timer { font-family: var(--font-mono); font-size: 38px; font-weight: 600; letter-spacing: .02em; margin-bottom: 18px; }
  .rec-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--danger); margin-bottom: 8px; animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .rec-controls { display: flex; gap: 16px; align-items: center; }
  .rec-main-btn {
    width: 72px; height: 72px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .rec-main-btn.start { background: var(--danger); }
  .rec-main-btn.stop { background: var(--text); }
  .rec-side-btn {
    width: 50px; height: 50px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg-elev-2);
    color: var(--text); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .divider-or { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 12px; margin: 18px 0; }
  .divider-or::before, .divider-or::after { content: ""; flex: 1; height: 1px; background: var(--border); }

  /* ---------- Note detail ---------- */
  .detail-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 6px; }
  .detail-title-input {
    flex: 1; background: none; border: none; outline: none;
    font-size: 21px; font-weight: 700; color: var(--text);
    font-family: inherit; padding: 2px 0;
  }
  .detail-meta { font-size: 12.5px; color: var(--text-dim); font-family: var(--font-mono); margin-bottom: 14px; }
  .audio-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .audio-bar audio { flex: 1; height: 36px; }

  .section-block {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .section-block h4 {
    margin: 0 0 10px;
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-block .body-text { font-size: 14.5px; line-height: 1.6; white-space: pre-wrap; }
  .action-item { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .action-item:last-child { border-bottom: none; }
  .action-item input[type=checkbox] { margin-top: 3px; width: 17px; height: 17px; accent-color: var(--mint-dim); }
  .action-item span { font-size: 14px; line-height: 1.4; }
  .action-item.done span { text-decoration: line-through; color: var(--text-dim); }

  .mini-btn {
    font-size: 12px; padding: 5px 10px;
    border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg-elev-2); color: var(--text);
    cursor: pointer; display: flex; align-items: center; gap: 5px;
  }
  .mini-btn:disabled { opacity: .5; }

  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 16px 0 6px; }

  .toast {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%);
    background: var(--bg-elev-2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 18px; border-radius: 999px;
    font-size: 13px; z-index: 80; opacity: 0; pointer-events: none;
    transition: opacity .2s, transform .2s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%; animation: spin .7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* mobile folders drawer */
  @media (max-width: 680px) {
    nav.folders {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 250px; background: var(--bg);
      z-index: 60; transform: translateX(-100%);
      transition: transform .22s ease;
      padding-top: calc(env(safe-area-inset-top) + 14px);
    }
    nav.folders.open { transform: translateX(0); }
    .nav-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 55; display: none;
    }
    .nav-backdrop.show { display: block; }
  }
  .hidden { display: none !important; }
</style>
</head>
<body data-theme="dark">

<div class="app">
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" aria-label="Carpetas" style="display:none">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand"><span class="dot"></span>Bitácora IA</div>
    <div class="searchbox">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Buscar en notas, transcripciones…" />
    </div>
    <button class="icon-btn" id="themeBtn" aria-label="Tema">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <button class="icon-btn" id="settingsBtn" aria-label="Ajustes">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 005 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </header>

  <div class="body-wrap">
    <div class="nav-backdrop" id="navBackdrop"></div>
    <nav class="folders" id="foldersNav">
      <div class="section-label">Carpetas</div>
      <div id="folderList"></div>
      <button class="new-folder-btn" id="addFolderBtn">+ Nueva carpeta</button>
    </nav>

    <main class="content" id="mainContent"></main>
  </div>

  <button class="fab" id="fabBtn" aria-label="Nueva nota">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#06140e" stroke-width="2.4"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- Sheet: nueva nota (grabar / importar) -->
<div class="overlay" id="newNoteOverlay">
  <div class="sheet">
    <div class="close-row"><button class="icon-btn" data-close="newNoteOverlay">✕</button></div>
    <h2>Nueva nota</h2>
    <div class="rec-visual">
      <div class="rec-dot hidden" id="recDot"></div>
      <div class="rec-timer" id="recTimer">00:00</div>
      <div class="rec-controls">
        <button class="rec-side-btn hidden" id="recCancelBtn" title="Cancelar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <button class="rec-main-btn start" id="recMainBtn" title="Grabar">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="12" r="9"/></svg>
        </button>
        <button class="rec-side-btn hidden" id="recPauseBtn" title="Pausar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
      </div>
    </div>
    <div class="divider-or">o</div>
    <div class="field">
      <label>Importar archivo de audio</label>
      <input type="file" id="importAudioInput" accept="audio/*" />
      <div class="hint">Acepta mp3, m4a, wav, etc. Se procesa igual que una grabación.</div>
    </div>
  </div>
</div>

<!-- Sheet: detalle de nota -->
<div class="overlay" id="detailOverlay">
  <div class="sheet" id="detailSheet" style="max-width:680px;">
    <div class="close-row">
      <button class="icon-btn" id="deleteNoteBtn" title="Eliminar nota" style="margin-right:auto;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      </button>
      <button class="icon-btn" data-close="detailOverlay">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- Sheet: carpetas -->
<div class="overlay" id="folderOverlay">
  <div class="sheet">
    <div class="close-row"><button class="icon-btn" data-close="folderOverlay">✕</button></div>
    <h2 id="folderSheetTitle">Nueva carpeta</h2>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="folderNameInput" placeholder="Ej. Reuniones de Academia" />
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-picker" id="folderColorPicker"></div>
    </div>
    <div class="btn-row">
      <button class="btn danger hidden" id="folderDeleteBtn">Eliminar carpeta</button>
      <button class="btn primary" id="folderSaveBtn">Guardar</button>
    </div>
  </div>
</div>

<!-- Sheet: ajustes -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <div class="close-row"><button class="icon-btn" data-close="settingsOverlay">✕</button></div>
    <h2>Ajustes</h2>
    <div class="field">
      <label>Clave de API (OpenAI)</label>
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <div class="hint">Se guarda únicamente en este dispositivo (localStorage) y se usa para transcripción (Whisper) y resumen (GPT). Nunca se envía a otro servidor que no sea api.openai.com.</div>
    </div>
    <div class="field">
      <label>Modelo de resumen</label>
      <select id="modelSelect">
        <option value="gpt-4o-mini">gpt-4o-mini (rápido y económico)</option>
        <option value="gpt-4o">gpt-4o (más completo)</option>
      </select>
    </div>
    <div class="field">
      <label>Idioma de transcripción</label>
      <select id="langSelect">
        <option value="es">Español</option>
        <option value="en">Inglés</option>
        <option value="">Detección automática</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn" id="exportAllBtn">Exportar respaldo (JSON)</button>
      <button class="btn primary" id="settingsSaveBtn">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  /* ======================= IndexedDB ======================= */
  const DB_NAME = "bitacoraIA";
  const DB_VERSION = 1;
  let db;

  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains("notes")) {
          d.createObjectStore("notes", { keyPath: "id" });
        }
        if (!d.objectStoreNames.contains("folders")) {
          d.createObjectStore("folders", { keyPath: "id" });
        }
        if (!d.objectStoreNames.contains("audio")) {
          d.createObjectStore("audio", { keyPath: "noteId" });
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = (e) => reject(e);
    });
  }

  function tx(store, mode = "readonly") {
    return db.transaction(store, mode).objectStore(store);
  }
  function idbGetAll(store) {
    return new Promise((res, rej) => {
      const r = tx(store).getAll();
      r.onsuccess = () => res(r.result);
      r.onerror = rej;
    });
  }
  function idbGet(store, key) {
    return new Promise((res, rej) => {
      const r = tx(store).get(key);
      r.onsuccess = () => res(r.result);
      r.onerror = rej;
    });
  }
  function idbPut(store, value) {
    return new Promise((res, rej) => {
      const r = tx(store, "readwrite").put(value);
      r.onsuccess = () => res(value);
      r.onerror = rej;
    });
  }
  function idbDelete(store, key) {
    return new Promise((res, rej) => {
      const r = tx(store, "readwrite").delete(key);
      r.onsuccess = () => res();
      r.onerror = rej;
    });
  }

  function fmtDuration(sec) {
    sec = Math.round(sec || 0);
    const m = Math.floor(sec / 60).toString().padStart(2, "0");
    const s = (sec % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
  }
  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString("es-MX", { day: "2-digit", month: "short" }) + " · " +
      d.toLocaleTimeString("es-MX", { hour: "2-digit", minute: "2-digit" });
  }

    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._h);

  }

  /* ======================= Notes list ======================= */
  async function loadNotes() {
    notes = await idbGetAll("notes");
    notes.sort((a, b) => b.createdAt - a.createdAt);
  }

  function escapeHTML(s) {
    return (s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  function filteredNotes() {
    let list = notes;
    if (activeFolderId !== "all") list = list.filter((n) => n.folderId === activeFolderId);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      list = list.filter((n) =>
        (n.title || "").toLowerCase().includes(q) ||
        (n.transcript || "").toLowerCase().includes(q) ||
        (n.summary || "").toLowerCase().includes(q)
      );
    }
    return list;
  }

  function renderNoteList() {

  /* ======================= Recording ======================= */
  function resetRecordingUI() {
    recordedSeconds = 0;
    document.getElementById("recTimer").textContent = "00:00";
    document.getElementById("recDot").classList.add("hidden");
    document.getElementById("recCancelBtn").classList.add("hidden");

  document.getElementById("recMainBtn").addEventListener("click", async () => {
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
      await startRecording();
    } else {
      stopRecording();
    }
  });

  document.getElementById("recPauseBtn").addEventListener("click", () => {
    if (!mediaRecorder) return;
    if (mediaRecorder.state === "recording") {
      mediaRecorder.pause();
      isPaused = true;
      clearInterval(recordTimerInterval);
    } else if (mediaRecorder.state === "paused") {
      mediaRecorder.resume();
      isPaused = false;
      tickTimer();
    }
  });

  document.getElementById("recCancelBtn").addEventListener("click", () => {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
      mediaRecorder.onstop = null;
      mediaRecorder.stream.getTracks().forEach((t) => t.stop());
      mediaRecorder.stop();
    }
    clearInterval(recordTimerInterval);
    closeOverlay("newNoteOverlay");
  });

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      recordedChunks = [];
      const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "";
      mediaRecorder = mime ? new MediaRecorder(stream, { mimeType: mime }) : new MediaRecorder(stream);
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || "audio/webm" });
        stream.getTracks().forEach((t) => t.stop());
        closeOverlay("newNoteOverlay");
        await createNoteFromBlob(blob, recordedSeconds);
      };
      mediaRecorder.start();
      recordedSeconds = 0;
      document.getElementById("recDot").classList.remove("hidden");
      document.getElementById("recCancelBtn").classList.remove("hidden");
      document.getElementById("recPauseBtn").classList.remove("hidden");
      const main = document.getElementById("recMainBtn");
      main.classList.remove("start"); main.classList.add("stop");
      main.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>`;
      tickTimer();
    } catch (err) {
      toast("No se pudo acceder al micrófono: " + err.message);
    }
  }

  function tickTimer() {
    clearInterval(recordTimerInterval);
    recordTimerInterval = setInterval(() => {
      recordedSeconds += 1;
      document.getElementById("recTimer").textContent = fmtDuration(recordedSeconds);
    }, 1000);
  }

  function stopRecording() {
    clearInterval(recordTimerInterval);
    if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
  }

  document.getElementById("importAudioInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    closeOverlay("newNoteOverlay");
    const durationSec = await estimateAudioDuration(file).catch(() => 0);
    await createNoteFromBlob(file, durationSec);
  });

  function estimateAudioDuration(blob) {
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(blob);
      const a = new Audio();
      a.src = url;
      a.addEventListener("loadedmetadata", () => {
        resolve(a.duration);
        URL.revokeObjectURL(url);
      });
      a.addEventListener("error", reject);
    });
  }

  async function createNoteFromBlob(blob, durationSec) {
    const id = uid();
    const note = {
      id,
      title: "Nota del " + new Date().toLocaleDateString("es-MX", { day: "2-digit", month: "short" }),
      folderId: activeFolderId !== "all" ? activeFolderId : null,
      createdAt: Date.now(),
      durationSec: durationSec || 0,
      transcript: "",
      summary: "",
      actionItems: [],
      mimeType: blob.type || "audio/webm",
    };
    await idbPut("notes", note);
    await idbPut("audio", { noteId: id, blob });
    await loadNotes();
    renderFolderNav();
    renderNoteList();
    openNoteDetail(id);
    toast("Nota guardada. Toca \"Transcribir\" cuando estés listo.");
  }

  /* ======================= OpenAI calls ======================= */
  async function transcribeNote(noteId, blob) {
    const { apiKey, lang } = getSettings();
    if (!apiKey) { toast("Agrega tu clave de API en Ajustes primero"); openOverlay("settingsOverlay"); return; }
    const btn = document.getElementById("transcribeBtn");
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Transcribiendo…`;
    try {
      const fd = new FormData();
      const ext = (blob.type || "").includes("mp4") ? "mp4" : (blob.type || "").includes("mpeg") ? "mp3" : "webm";
      fd.append("file", blob, `audio.${ext}`);
      fd.append("model", "whisper-1");
      if (lang) fd.append("language", lang);

      const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
        method: "POST",
        headers: { Authorization: `Bearer ${apiKey}` },
        body: fd,
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`API respondió ${res.status}: ${errText.slice(0, 200)}`);
      }
      const data = await res.json();
      const n = notes.find((x) => x.id === noteId);
      n.transcript = data.text || "";
      await idbPut("notes", n);
      await loadNotes(); renderNoteList();
      await renderDetail();
      toast("Transcripción lista");
    } catch (err) {
      toast("Error al transcribir: " + err.message);
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }

  async function summarizeNote(noteId) {
    const { apiKey, model } = getSettings();
    if (!apiKey) { toast("Agrega tu clave de API en Ajustes primero"); openOverlay("settingsOverlay"); return; }
    const n = notes.find((x) => x.id === noteId);
    if (!n || !n.transcript) { toast("Primero transcribe la nota"); return; }
    const btn = document.getElementById("summarizeBtn");
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Generando…`;
    try {
      const sysPrompt = `Eres un asistente que resume notas de voz (reuniones o notas de investigación) en español. ` +
        `Responde EXCLUSIVAMENTE con un JSON válido (sin texto adicional, sin markdown) con esta forma exacta: ` +
        `{"title": "título breve y descriptivo (máx 8 palabras)", "summary": "resumen claro de 3 a 6 oraciones", "actionItems": ["acción 1", "acción 2"]}. ` +
        `Si no hay tareas o acciones claras, devuelve actionItems como arreglo vacío.`;
      const res = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model,
          messages: [
            { role: "system", content: sysPrompt },
            { role: "user", content: n.transcript },
          ],
          temperature: 0.3,
        }),
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`API respondió ${res.status}: ${errText.slice(0, 200)}`);
      }
      const data = await res.json();
      let raw = data.choices?.[0]?.message?.content || "{}";
      raw = raw.replace(/^```json\s*|```$/g, "").trim();
      let parsed;
      try { parsed = JSON.parse(raw); } catch { parsed = { summary: raw, actionItems: [] }; }

      n.summary = parsed.summary || "";
      if (parsed.title && (!n.title || n.title.startsWith("Nota del"))) n.title = parsed.title;
      n.actionItems = (parsed.actionItems || []).map((t) => ({ id: uid(), text: t, done: false }));
      await idbPut("notes", n);
      await loadNotes(); renderFolderNav(); renderNoteList();
      await renderDetail();
      toast("Resumen generado");
    } catch (err) {
      toast("Error al generar resumen: " + err.message);
      btn.disabled = false;
      btn.innerHTML = original;
    }
  }

  /* ======================= Export ======================= */
  function exportNoteMarkdown(n) {
    let md = `# ${n.title || "Nota sin título"}\n\n`;
    md += `*${fmtDate(n.createdAt)} · ${fmtDuration(n.durationSec)}*\n\n`;
    if (n.summary) md += `## Resumen\n\n${n.summary}\n\n`;
    if (n.actionItems && n.actionItems.length) {
      md += `## Tareas\n\n`;
      n.actionItems.forEach((it) => { md += `- [${it.done ? "x" : " "}] ${it.text}\n`; });
      md += `\n`;
    }
    if (n.transcript) md += `## Transcripción completa\n\n${n.transcript}\n`;
    downloadText(md, (n.title || "nota").replace(/[^\w\-]+/g, "_") + ".md");
  }

  function downloadText(text, filename) {
    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  document.getElementById("exportAllBtn").addEventListener("click", () => {
    const payload = { exportedAt: new Date().toISOString(), folders, notes };
    downloadText(JSON.stringify(payload, null, 2), "bitacora_ia_respaldo.json");
    toast("Respaldo descargado (sin archivos de audio)");
  });

  /* ======================= Settings sheet ======================= */
  document.getElementById("settingsBtn").addEventListener("click", () => {
    loadSettingsFields();
    openOverlay("settingsOverlay");
  });
  document.getElementById("settingsSaveBtn").addEventListener("click", () => {
    saveSettingsFields();
    closeOverlay("settingsOverlay");
    toast("Ajustes guardados");
  });

  /* ======================= Theme + mobile nav ======================= */
  document.getElementById("themeBtn").addEventListener("click", toggleTheme);

  function closeMobileNav() {
    document.getElementById("foldersNav").classList.remove("open");
    document.getElementById("navBackdrop").classList.remove("show");
  }
  function setupMobileNav() {
    const isMobile = window.innerWidth <= 680;
    document.getElementById("menuBtn").style.display = isMobile ? "flex" : "none";
  }
  document.getElementById("menuBtn").addEventListener("click", () => {
    document.getElementById("foldersNav").classList.add("open");
    document.getElementById("navBackdrop").classList.add("show");
  });
  document.getElementById("navBackdrop").addEventListener("click", closeMobileNav);
  window.addEventListener("resize", setupMobileNav);

  /* ======================= Init ======================= */
  async function init() {
    applyTheme(getSettings().theme);
    setupMobileNav();
    await openDB();
    await loadFolders();
    await loadNotes();
    renderFolderNav();
    renderNoteList();

    if (!getSettings().apiKey) {
      setTimeout(() => {
        toast("Agrega tu clave de API de OpenAI en Ajustes ⚙️ para transcribir y resumir");
      }, 800);
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }
  }

  init();
})();
</script>
</body>
</html>
